<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <h1>Stone Paper Scissors</h1>

    <div class="buttons">
        <button onclick="playGame('stone')">🪨 Stone</button>
        <button onclick="playGame('paper')">📄 Paper</button>
        <button onclick="playGame('scissors')">✂️ Scissors</button>
    </div>

    <div class="result">
        <p><strong>Your Choice:</strong> <span id="userChoice">-</span></p>
        <p><strong>Computer:</strong> <span id="computerChoice">-</span></p>

        <h2 id="winner">Choose an option</h2>

        <h3>Score</h3>
        <p>You : <span id="userScore">0</span></p>
        <p>Computer : <span id="computerScore">0</span></p>
        <button class="reset-btn" onclick="resetGame()">
    🔄 Reset Game
</button>
    </div>
</div>

<script src="inde.js"></script>

</body>
</html>
